<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f4f6f9"></rect>

  <!-- Eye Shape -->
  <ellipse cx="300" cy="120" rx="140" ry="60" fill="none" stroke="#0d6efd" stroke-width="6"></ellipse>

  <!-- Pupil -->
  <circle cx="300" cy="120" r="35" fill="#0d6efd"></circle>
  <circle cx="315" cy="105" r="10" fill="white"></circle>

  <!-- Glasses Frame -->
  <circle cx="230" cy="120" r="45" fill="none" stroke="#333" stroke-width="5"></circle>
  <circle cx="370" cy="120" r="45" fill="none" stroke="#333" stroke-width="5"></circle>
  <line x1="275" y1="120" x2="325" y2="120" stroke="#333" stroke-width="5"></line>

  <!-- Brand Name -->
  <text x="300" y="210" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#0d6efd" font-weight="bold">
    OpticEye
  </text>

  <!-- Tagline -->
  <text x="300" y="235" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#555">
    Online Eyewear Shopping System
  </text>

</svg>
